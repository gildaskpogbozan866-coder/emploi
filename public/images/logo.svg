<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="white"/>
  <!-- Arc supérieur : vert foncé -->
  <path d="M 9.4 39.1 A 42 42 0 0 1 90.6 39.1" fill="none" stroke="#1d6b45" stroke-width="5" stroke-linecap="round"/>
  <!-- Arc inférieur : orange -->
  <path d="M 90.6 60.9 A 42 42 0 0 1 9.4 60.9" fill="none" stroke="#e8873b" stroke-width="5" stroke-linecap="round"/>
  <!-- E : barre verticale gauche -->
  <rect x="26" y="32" width="5" height="36" rx="1.5" fill="#1d6b45"/>
  <!-- E : barre horizontale haute -->
  <rect x="26" y="32" width="22" height="5" rx="1.5" fill="#1d6b45"/>
  <!-- E : barre horizontale centrale (plus courte) -->
  <rect x="26" y="47.5" width="16" height="5" rx="1.5" fill="#1d6b45"/>
  <!-- E : barre horizontale basse -->
  <rect x="26" y="63" width="22" height="5" rx="1.5" fill="#1d6b45"/>
  <!-- B : axe vertical gauche (point de fusion) -->
  <line x1="48" y1="32" x2="48" y2="68" stroke="#e8873b" stroke-width="5" stroke-linecap="round"/>
  <!-- B : bosse supérieure -->
  <path d="M 48 32 Q 70 32 70 44 Q 70 50.5 48 50.5" fill="none" stroke="#e8873b" stroke-width="5" stroke-linecap="round"/>
  <!-- B : bosse inférieure -->
  <path d="M 48 50.5 Q 72 50.5 72 61 Q 72 68 48 68" fill="none" stroke="#e8873b" stroke-width="5" stroke-linecap="round"/>
</svg>
